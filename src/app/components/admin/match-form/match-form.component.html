<!-- src/app/components/admin/match-form/match-form.component.html -->
<form (ngSubmit)="onSubmit()" class="match-form">
  <div class="form-row">
    <div class="form-group">
      <label for="equipe1">Équipe 1 *:</label>
      <select 
        id="equipe1"
        [(ngModel)]="formData.equipe1Id" 
        name="equipe1"
        (change)="onEquipe1Change()"
        required>
        <option value="0">-- Sélectionner une équipe --</option>
        <option *ngFor="let equipe of equipes" [value]="equipe.id">
          {{ equipe.name }}
        </option>
      </select>
    </div>
    
    <div class="form-group">
      <label for="equipe2">Équipe 2 *:</label>
      <select 
        id="equipe2"
        [(ngModel)]="formData.equipe2Id" 
        name="equipe2"
        [disabled]="!formData.equipe1Id"
        required>
        <option value="0">-- Sélectionner une équipe --</option>
        <option *ngFor="let equipe of getAvailableEquipes2()" [value]="equipe.id">
          {{ equipe.name }}
        </option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label for="dateMatch">Date et heure du match *:</label>
    <input 
      type="datetime-local" 
      id="dateMatch"
      [(ngModel)]="formData.dateMatch"
      name="dateMatch"
      required>
  </div>
  
  <div class="form-group">
    <label for="resultat">Résultat (optionnel):</label>
    <input 
      type="text" 
      id="resultat"
      [(ngModel)]="formData.resultat" 
      name="resultat"
      placeholder="Ex: 2-1, Victoire Équipe 1, etc.">
  </div>

  <div class="form-actions">
    <button type="button" class="btn btn-secondary" (click)="onCancel()">
      Annuler
    </button>
    <button 
      type="submit" 
      class="btn btn-primary" 
      [disabled]="!isFormValid() || formData.equipe1Id === formData.equipe2Id">
      {{ isEditing ? 'Modifier' : 'Créer' }} le match
    </button>
  </div>

  <div *ngIf="formData.equipe1Id === formData.equipe2Id && formData.equipe1Id !== 0" class="warning">
    ⚠️ Une équipe ne peut pas jouer contre elle-même
  </div>
</form>
