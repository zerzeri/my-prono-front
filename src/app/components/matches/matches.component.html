<div class="matches-container">
  <div class="page-header">
    <h2>Matchs</h2>
    <p class="subtitle">Consultez les matchs et déposez vos pronostics.</p>
  </div>

  <div class="filter-bar">
    <button
      *ngFor="let f of filters"
      type="button"
      class="filter-pill"
      [class.active]="filterType === f.value"
      (click)="filterType = f.value; applyFilter()">
      {{ f.label }}
    </button>
  </div>

  <div class="matches-grid">
    <div *ngFor="let match of filteredMatches"
         class="match-card card"
         [class.finished]="match.resultat || isMatchPast(match.dateMatch)">

      <div class="match-header">
        <span class="match-date">{{ formatDate(match.dateMatch) }}</span>
        <span class="badge"
              [class.badge-finished]="match.resultat"
              [class.badge-expired]="!match.resultat && isMatchPast(match.dateMatch)"
              [class.badge-today]="!match.resultat && !isMatchPast(match.dateMatch) && isMatchToday(match.dateMatch)"
              [class.badge-soon]="!match.resultat && !isMatchPast(match.dateMatch) && !isMatchToday(match.dateMatch) && isMatchSoon(match.dateMatch)"
              [class.badge-upcoming]="!match.resultat && !isMatchPast(match.dateMatch) && !isMatchToday(match.dateMatch) && !isMatchSoon(match.dateMatch)">
          {{ getMatchStatus(match) }}
        </span>
      </div>

      <div class="teams">
        <span class="team-name">{{ match.equipe1 }}</span>
        <span class="vs" *ngIf="!match.resultat">VS</span>
        <span class="score" *ngIf="match.resultat">{{ match.resultat }}</span>
        <span class="team-name">{{ match.equipe2 }}</span>
      </div>

      <div class="pronostic-section" *ngIf="canMakePronostic(match)">
        <label [for]="'prono-' + match.id">Votre pronostic</label>
        <div class="pronostic-input">
          <input
            type="text"
            [id]="'prono-' + match.id"
            [(ngModel)]="newPronostic[match.id!]"
            placeholder="Ex : 2-1"
            (keyup.enter)="submitPronostic(match.id!)">
          <button
            type="button"
            (click)="submitPronostic(match.id!)"
            class="btn btn-primary"
            [disabled]="!newPronostic[match.id!]">
            Valider
          </button>
        </div>
      </div>

      <div class="expired-message" *ngIf="!match.resultat && isMatchPast(match.dateMatch)">
        ⏰ Temps écoulé pour les pronostics
      </div>
    </div>
  </div>

  <div *ngIf="filteredMatches.length === 0" class="empty-state">
    <span class="empty-icon">📭</span>
    <p>Aucun match trouvé pour ce filtre.</p>
  </div>
</div>
